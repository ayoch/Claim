{% extends "base.html" %}

{% block title %}Admin Login - Claim Server{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">Admin Login</h3>
                <form method="post" action="/admin-ui/login">
                    <div class="mb-3">
                        <label for="admin_key" class="form-label">Admin Key</label>
                        <input type="password" class="form-control" id="admin_key" name="admin_key"
                               placeholder="Enter admin key" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Dark River</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo-title">
                <img src="/static/dark-river-logo.png" alt="Dark River" class="logo">
                <h1>Dark River</h1>
            </div>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/blog.html">Blog</a></li>
                <li><a href="/admin.html" id="admin-link" style="display: none;">Admin</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h3>Blog</h3>
            <div id="blog-posts-list">
                <p class="loading">Loading posts...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Dark River. All rights reserved.</p>
    </footer>

    <script>
        // Check if admin key is set
        if (localStorage.getItem('adminKey')) {
            document.getElementById('admin-link').style.display = 'block';
        }

        async function loadAllPosts() {
            try {
                const response = await fetch('/api/blog/posts?limit=50');
                const posts = await response.json();

                const container = document.getElementById('blog-posts-list');

                if (posts.length === 0) {
                    container.innerHTML = '<p class="loading">No posts yet.</p>';
                    return;
                }

                container.innerHTML = posts.map(post => `
                    <div class="post-card">
                        <h4><a href="/post.html?slug=${post.slug}" style="color: inherit; text-decoration: none;">${post.title}</a></h4>
                        <p class="post-excerpt">${post.excerpt}</p>
                        <p class="post-meta">${new Date(post.published_at).toLocaleDateString('en-US', {
                            year: 'numeric',
                            month: 'long',
                            day: 'numeric'
                        })}</p>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Failed to load posts:', error);
                document.getElementById('blog-posts-list').innerHTML =
                    '<p class="loading">Failed to load posts.</p>';
            }
        }

        loadAllPosts();
    </script>
</body>
</html>
